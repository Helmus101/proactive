<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice HUD</title>
  <style>
    :root {
      color-scheme: light;
      --bg: rgba(253, 252, 240, 0.9);
      --border: rgba(233, 154, 44, 0.2);
      --text: #2d241a;
      --muted: #7c6d5e;
      --soft: #a69685;
      --accent: #e99a2c;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    body {
      padding: 8px;
    }
    .hud {
      border-radius: 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      box-shadow: 0 10px 26px rgba(0,0,0,0.24);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 9px 9px 8px;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .title {
      font-size: 11px;
      font-weight: 650;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .pill {
      font-size: 9px;
      color: var(--accent);
      background: rgba(233, 154, 44, 0.12);
      padding: 3px 7px;
      border-radius: 999px;
    }
    .status {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
      min-height: 14px;
    }
    .transcript {
      color: var(--text);
      font-size: 12px;
      line-height: 1.3;
      max-height: 30px;
      overflow: hidden;
    }
    .meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2px;
      color: var(--soft);
      font-size: 10px;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <div class="hud">
    <div class="top">
      <div id="title" class="title">I'm listening</div>
      <div id="phase" class="pill">Resting</div>
    </div>
    <div id="status" class="status">Speak when you're ready.</div>
    <div id="transcript" class="transcript">I'm here...</div>
    <div class="meta">
      <div id="effect"></div>
      <div id="remaining"></div>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    const titleEl = document.getElementById('title');
    const phaseEl = document.getElementById('phase');
    const statusEl = document.getElementById('status');
    const transcriptEl = document.getElementById('transcript');
    const effectEl = document.getElementById('effect');
    const remainingEl = document.getElementById('remaining');

    const setText = (el, text) => {
      if (!el) return;
      el.textContent = text || '';
    };

    ipcRenderer.on('voice-session-update', (_event, payload) => {
      if (!payload) {
        setText(titleEl, "I'm listening");
        setText(phaseEl, 'Resting');
        setText(statusEl, "Speak when you're ready.");
        setText(transcriptEl, "I'm here...");
        setText(effectEl, '');
        setText(remainingEl, '');
        return;
      }

      const phase = String(payload.status || 'idle').replace(/_/g, ' ');
      setText(phaseEl, phase);
      setText(titleEl, payload.status === 'acting' ? 'Helping' : "I'm listening");
      setText(transcriptEl, payload.partial_transcript || payload.transcript || 'I'm here...');

      if (payload.status === 'listening') {
        setText(statusEl, 'Listening...');
      } else if (payload.status === 'transcribing') {
        setText(statusEl, 'Thinking...');
      } else if (payload.status === 'acting') {
        setText(statusEl, payload.agent_stage ? `Acting: ${payload.agent_stage}` : 'Helping you out.');
      } else if (payload.status === 'completed') {
        setText(statusEl, payload.result || 'Done.');
      } else if (payload.status === 'failed') {
        setText(statusEl, payload.error || 'I couldn't quite do that.');
      }

      setText(effectEl, payload.effect_summary ? `Changed: ${payload.effect_summary}` : '');
      setText(remainingEl, payload.remaining_gap ? `Next: ${payload.remaining_gap}` : '');
    });

    ipcRenderer.on('planner-step', (_event, payload) => {
      if (!payload) return;
      if (payload.phase === 'executed') {
        setText(effectEl, payload.effect_summary ? `Changed: ${payload.effect_summary}` : '');
        setText(remainingEl, payload.remaining_gap ? `Next: ${payload.remaining_gap}` : '');
      }
    });
  </script>
</body>
</html>
