<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Agent</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Web Agent</span>
      </div>
      <div class="status-indicator" id="statusIndicator">
        <span class="status-dot"></span>
        <span class="status-text">Ready</span>
      </div>
    </header>

    <main class="main">
      <!-- Settings Panel (hidden by default) -->
      <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
          <h3>Settings</h3>
          <button class="close-settings" id="closeSettings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="settings-content">
          <div class="setting-group">
            <label for="apiKey">DeepSeek API Key</label>
            <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
          </div>
          <div class="setting-group">
            <label for="model">Model</label>
            <select id="model">
              <option value="deepseek-chat">DeepSeek Chat (Recommended)</option>
              <option value="deepseek-reasoner">DeepSeek Reasoner</option>
            </select>
          </div>
          <div class="setting-group">
            <label for="maxSteps">Max Steps</label>
            <input type="number" id="maxSteps" value="30" min="5" max="100">
          </div>
          <button class="save-settings" id="saveSettings">Save Settings</button>
        </div>
      </div>

      <!-- Goal Input -->
      <div class="input-section" id="inputSection">
        <label for="goalInput">What would you like me to do?</label>
        <textarea 
          id="goalInput" 
          placeholder="e.g., Search for the latest AI news on Google and summarize the top 3 results..."
          rows="3"
        ></textarea>
        <div class="input-actions">
          <button class="settings-btn" id="settingsBtn" title="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          <button class="start-btn" id="startBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            Start
          </button>
        </div>
      </div>

      <!-- Progress Section -->
      <div class="progress-section" id="progressSection">
        <div class="progress-header">
          <div class="progress-info">
            <span class="step-counter" id="stepCounter">Step 0 / 30</span>
            <span class="progress-goal" id="progressGoal"></span>
          </div>
          <button class="stop-btn" id="stopBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="6" y="6" width="12" height="12"/>
            </svg>
            Stop
          </button>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- Action Log -->
      <div class="log-section" id="logSection">
        <div class="log-header">
          <span>Action Log</span>
          <button class="clear-log" id="clearLog">Clear</button>
        </div>
        <div class="log-container" id="logContainer">
          <div class="log-empty">Actions will appear here...</div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <span>Powered by DeepSeek</span>
    </footer>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
