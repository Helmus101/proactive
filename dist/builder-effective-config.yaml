directories:
  output: dist
  buildResources: build
appId: com.weave.todo
productName: Weave Todo
files:
  - filter:
      - main.js
      - preload.js
      - renderer/**/*
      - node_modules/**/*
mac:
  target:
    - dmg
  category: public.app-category.productivity
  icon: build/icon.icns
dmg:
  background: build/dmg-background.png
  icon: build/icon.icns
  contents:
    - x: 130
      'y': 220
      type: file
    - x: 410
      'y': 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380
electronVersion: 28.3.3
